# Portal relay + frontend - nginx reverse proxy configuration example.
# Replace "portal.example.com" with your actual domain throughout.
#
# Traffic flow:
#   :80  -> redirect to HTTPS
#   :443 -> L4 SNI inspection (ssl_preread, no TLS termination)
#            portal.example.com    -> :8443 (nginx L7, terminates TLS)
#            *.portal.example.com  -> 127.0.0.1:4443 (portal SNI, raw TCP passthrough)
#
# L7 path routing on portal.example.com:
#   API/control paths -> https://127.0.0.1:4017 (portal)
#   Everything else   -> http://127.0.0.1:8080  (portal-frontend)

events {
    worker_connections 4096;
}

stream {
    map $ssl_preread_server_name $backend {
        portal.example.com          portal_web;
        ~\.portal\.example\.com$    portal_sni;
        default                     portal_web;
    }

    upstream portal_web {
        server 127.0.0.1:8443;
    }

    upstream portal_sni {
        # Portal SNI listener. TLS is not terminated here.
        server 127.0.0.1:4443;
    }

    server {
        listen 443;
        ssl_preread on;
        proxy_pass $backend;
        proxy_connect_timeout 5s;
        proxy_timeout 86400s;
    }
}

http {
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    upstream portal_api {
        # Portal API listener is HTTPS even though it is reached only internally.
        server 127.0.0.1:4017;
        keepalive 16;
    }

    upstream portal_frontend {
        # Static frontend nginx container.
        server 127.0.0.1:8080;
        keepalive 16;
    }

    server {
        listen 8443 ssl;
        server_name portal.example.com;
        server_tokens off;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # /sdk/connect is hijacked by the relay into a long-lived raw TCP
        # reverse session. Keep HTTP/1.1, disable buffering, and use long timeouts.
        location = /sdk/connect {
            proxy_pass https://portal_api;
            proxy_ssl_verify off;
            proxy_ssl_server_name on;
            proxy_ssl_name $host;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $http_connection;

            proxy_buffering         off;
            proxy_request_buffering off;
            proxy_read_timeout      86400s;
            proxy_send_timeout      86400s;
        }

        # API/control endpoints belong to portal. Exact /admin is intentionally
        # not matched so the React admin route can be served by portal-frontend.
        location ~ ^/(state$|admin/|sdk/|service/|thumbnail/|install\.sh$|install\.ps1$|install/bin/|discovery$|healthz$|x402(/|$)) {
            proxy_pass https://portal_api;
            proxy_ssl_verify off;
            proxy_ssl_server_name on;
            proxy_ssl_name $host;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Connection        "";

            proxy_read_timeout 60s;
        }

        location / {
            proxy_pass http://portal_frontend;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Connection        "";

            proxy_read_timeout 60s;
        }
    }

    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }
}
